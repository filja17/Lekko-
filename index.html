<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F. Jaworski</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/journey.css">
  <link rel="stylesheet" href="css/subpages.css">
  <link rel="stylesheet" href="css/album.css">
  <style>
    /* ── INTRO ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #intro.done {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #intro-word {
      font-size: clamp(5rem, 13vw, 14rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--white);
      text-align: center;
      padding: 0 5vw;
      line-height: 1;
      opacity: 1;
      transition: opacity 0.12s ease;
    }
    #intro-word.flash-out { opacity: 0; }
    #intro-label {
      position: fixed;
      bottom: 2.5rem;
      right: 3rem;
      z-index: 1001;
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.35);
    }

    /* ── ALBUMS DIVIDER ── */
    #albums-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 5vw;
      position: relative;
      overflow: hidden;
    }
    #albums-title {
      font-size: clamp(5rem, 16vw, 18rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 0.85;
      color: var(--white);
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.23,1,0.32,1);
      user-select: none;
    }
    #albums-title.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- intro overlay -->
  <div id="intro">
    <video id="intro-video" autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.38;z-index:0;pointer-events:none;"><source src="assets/back.mp4" type="video/mp4"></video>
    <div id="intro-word" style="position:relative;z-index:1;"></div>
  </div>
  <div id="intro-label">portfolio</div>

  <!-- nav -->
  <nav id="nav">
    <ul class="nav-links">
      <li><a href="#" data-page="projects">Projekty</a></li>
      <li><a href="#" data-page="gallery">Serie</a></li>
      <li><a href="#" data-page="ebru">Marmurkowanie</a></li>
      <li><a href="#" data-page="about">O mnie</a></li>
      <li><a href="#" data-page="contact">Kontakt</a></li>
    </ul>
    <button class="nav-burger" id="nav-burger" aria-label="menu">
      <span></span><span></span>
    </button>
  </nav>

  <!-- mobile drawer -->
  <div id="nav-drawer">
    <button class="drawer-close" id="drawer-close">zamknij</button>
    <a href="#" data-page="projects">Projekty</a>
    <a href="#" data-page="gallery">Serie</a>
    <a href="#" data-page="ebru">Marmurkowanie</a>
    <a href="#" data-page="about">O mnie</a>
    <a href="#" data-page="contact">Kontakt</a>
  </div>

  <!-- albums divider section -->
  <div id="albums-section">
    <div id="albums-title">Albumy</div>
  </div>

  <!-- scroll journey -->
  <div id="journey">
    <div id="frame">

      <div id="bg-stack"></div>
      <div id="text-shield"></div>
      <div id="bg-veil"></div>

      <div id="cover-wrap">
        <img id="cover-img" src="" alt="" draggable="false">
        <div id="cover-placeholder"></div>
      </div>

      <div id="text-panel">
        <div id="album-meta">
          <span id="album-number"></span>
          <span id="album-year"></span>
        </div>
        <div id="text-morph">
          <div id="morph-title"  class="morph-layer"></div>
          <div id="morph-tracks" class="morph-layer"></div>
          <div id="morph-quote"  class="morph-layer"></div>
        </div>
        <div id="album-tags"></div>
        <a id="album-cta" href="#">Zobacz album</a>
      </div>

      <div id="scroll-hint">
        <span>scroll</span>
        <div class="scroll-line"></div>
      </div>
      <div id="progress-dots"></div>

    </div>
  </div>

  <!-- overlay -->
  <div id="overlay">
    <div id="overlay-inner">
      <button id="overlay-close">zamknij</button>
      <div id="overlay-content"></div>
    </div>
  </div>

  <!-- lightbox -->
  <div id="lightbox">
    <button id="lightbox-close">zamknij</button>
    <button class="lb-nav" id="lb-prev">←</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lb-nav" id="lb-next">→</button>
    <div id="lightbox-counter"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/journey.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/subpages.js"></script>
  <script>
    /* ── INTRO ANIMATION ── */
    (function() {
      const words = ['F. Jaworski', 'Szelest', 'Nota Contra Notam', 'Among Other Sounds'];
      const el    = document.getElementById('intro-word');
      const intro = document.getElementById('intro');
      let i = 0;
      let looping = true;
      const SHOW_MS = 700;   // how long each word is visible
      const GAP_MS  = 60;    // unused now

      // show first word immediately
      el.textContent = words[0];

      function tick() {
        if (!looping) return;
        // quick fade out
        el.classList.add('flash-out');
        setTimeout(() => {
          i = (i + 1) % words.length;
          el.textContent = words[i];
          // quick fade in
          el.classList.remove('flash-out');
          setTimeout(tick, SHOW_MS);
        }, 130); // matches transition duration
      }

      // start cycling after first word shown
      setTimeout(tick, SHOW_MS);

      // stop and fade out when user scrolls
      let dismissed = false;
      window.addEventListener('scroll', function onFirstScroll() {
        if (dismissed) return;
        dismissed = true;
        looping = false;
        intro.classList.add('done');
        setTimeout(() => { intro.style.display = 'none'; }, 600);
        window.removeEventListener('scroll', onFirstScroll);
      }, { passive: true });

      /* albums divider — fade in on scroll into view */
      const albumsTitle = document.getElementById('albums-title');
      const introLabel  = document.getElementById('intro-label');
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
          albumsTitle.classList.add('visible');
          introLabel.style.opacity = '0';
          introLabel.style.pointerEvents = 'none';
        } else {
          /* only restore if intro is gone */
          if (intro.style.display === 'none') {
            introLabel.style.opacity = '0';
          }
        }
      }, { threshold: 0.2 });
      observer.observe(document.getElementById('albums-section'));
    })();
  </script>
</body>
</html>
