<body class="no-hero">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link"><h1 class="logo">Lekkość</h1></a>
            <ul class="nav-links">
                <li><a href="collections.html">Kolekcje</a></li>

            <button class="nav-hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <section class="contact-section">
        <h2>Napisz</h2>
        <p>z pytaniem, emocją, myślą…</p>

        <div class="contact-container">
            <div class="contact-info">
                <h3>Gdzie nas znaleźć</h3>
                <p>
                    <strong>Email</strong><br>
                    <a href="mailto:czesc@lekkost.pl">czesc@lekkost.pl</a>
                </p>
                <p>
                    <strong>Instagram</strong><br>
                    <a href="https://instagram.com/lekkost" target="_blank">@lekkost.pl</a>
                </p>
                
            </div>

            <form class="contact-form" id="contactForm">
                <div class="form-field">
                    <input type="text" placeholder="Imię i Nazwisko" required>
                    <span class="field-error-msg"></span>
                </div>
                <div class="form-field">
                    <input type="email" placeholder="Email" required>
                    <span class="field-error-msg"></span>
                </div>
                <div class="form-field">
                    <textarea placeholder="Wiadomość" rows="6" required></textarea>
                    <span class="field-error-msg"></span>
                </div>
                <button type="submit" class="submit-btn">Wyślij</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">Lekkość</span>
                <span class="footer-tagline">88 sztuk rocznie. Handmade with silk and intention.</span>
