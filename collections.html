<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolekcje — Lekkość</title>
    <meta name="description" content="Kolekcje ręcznie barwionych jedwabnych chust.">
    <meta property="og:title" content="Kolekcje — Lekkość">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://lekkost.pl/assets/images/og/og-collections.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body class="collections-page">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link"><h1 class="logo">Lekkość</h1></a>
            <ul class="nav-links">
                <li><a href="collections.html" class="active">Kolekcje</a></li>
                <li><a href="process.html">Proces</a></li>
                <li><a href="about.html">O mnie</a></li>
                <li><a href="contact.html">Kontakt</a></li>
            </ul>
            <button class="nav-hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Tło zdjęciowe całej sekcji — od navbar do końca gridu chust -->
    <div class="collections-bg-wrap">
        <img src="assets/images/collections/collections-bg.jpg" alt="" loading="eager" fetchpriority="high" class="collections-bg-img">

        <div class="collections-bg-content">
            <!-- Pas filtrów — wąski, tuż pod navbar -->
            <div class="collections-filter-bar">
                <div class="color-filters">
                    <button class="filter-btn active" data-color="beige">Uniesienie I</button>
                    <button class="filter-btn" data-color="umbra">Uniesienie II</button>
                    <button class="filter-btn" data-color="sage">Uniesienie III</button>
                    <button class="filter-btn" data-color="rust">Uniesienie IV</button>
                </div>
            </div>

            <div class="availability-counter" id="availabilityCounter"></div>
            <div class="scarves-grid-full" id="scarvesGrid"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-large" id="scarfModal">
        <div class="modal-large-content">
            <button class="modal-close" id="modalCloseBtn" aria-label="Zamknij">&times;</button>

            <div class="modal-large-inner">

                <div class="modal-gallery-section">
                    <div class="modal-main-image-container" id="modalMainContainer">
                        <img id="modalMainImage" src="" alt="">
                        <button class="modal-gallery-prev" id="galleryPrev">&#8592;</button>
                        <button class="modal-gallery-next" id="galleryNext">&#8594;</button>
                    </div>
                    <div class="modal-thumbnails" id="modalThumbnails"></div>
                </div>

                <div class="modal-info-section">
                    <div>
                        <div class="modal-header-info">
                            <h2 id="modalTitle"></h2>
                            <p id="modalColor" class="modal-color"></p>
                        </div>
                        <div class="modal-description-box" style="margin: 1.2rem 0;">
                            <p id="modalDescription" class="modal-description"></p>
                        </div>
                        <div class="modal-specs" id="modalDetails"></div>
                    </div>

                    <div>
                        <div class="modal-options" style="margin-bottom:1.2rem;">
                            <div class="option-group">
                                <label>Typ</label>
                                <div class="option-buttons">
                                    <button class="type-btn active" data-type="original">
                                        <span>Oryginalna odbitka</span>
                                    </button>
                                    <button class="type-btn" data-type="print">
                                        <span>Kopia drukowana</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="modal-action">
                            <button class="order-btn-large" id="orderBtnLarge">
                                <span class="order-arrow">→</span>
                                <span class="order-price-hover" id="priceDisplay">450 PLN</span>
                            </button>
                            <div class="modal-sold-notice" id="modalSoldNotice" style="display:none;">
                                Ta chusta została już sprzedana
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">Lekkość</span>
                <span class="footer-tagline">Handmade with silk and intention.</span>
            </div>
            <div class="footer-links">
                <a href="privacy.html">Polityka Prywatności</a>
                <a href="terms.html">Regulamin</a>
                <a href="contact.html">Kontakt</a>
                <a href="https://instagram.com/lekkost" target="_blank">Instagram</a>
            </div>
            <div class="footer-copy">&copy; 2026 Lekkość</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
